<!-- @dsCard group="Components" name="Buttons" subtitle="Primary, secondary/approve, and icon+label action styles" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>CareTime — Buttons</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-gray-50 p-10">
  <div class="max-w-2xl mx-auto space-y-8">
    <header>
      <h1 class="text-2xl font-bold text-gray-900">Buttons</h1>
      <p class="text-sm text-gray-500 mt-1">Distilled from repeated inline patterns — no shared Button component exists yet.</p>
    </header>

    <section class="bg-white rounded-xl shadow-sm border border-gray-100 p-6 space-y-4">
      <h2 class="text-xs font-semibold text-gray-500 uppercase tracking-wide">Primary</h2>
      <div class="flex flex-wrap items-center gap-3">
        <button class="bg-blue-600 text-white px-4 py-2 rounded-lg text-sm font-semibold hover:bg-blue-700 transition-colors">Save Changes</button>
        <button class="bg-blue-600 text-white px-4 py-2 rounded-lg text-sm font-semibold opacity-50 cursor-not-allowed" disabled>Saving…</button>
      </div>
    </section>

    <section class="bg-white rounded-xl shadow-sm border border-gray-100 p-6 space-y-4">
      <h2 class="text-xs font-semibold text-gray-500 uppercase tracking-wide">Action (indigo — used for "Approve")</h2>
      <div class="flex flex-wrap items-center gap-3">
        <button class="flex items-center gap-1.5 bg-indigo-600 text-white px-3 py-1.5 rounded-lg text-xs font-semibold hover:bg-indigo-700 transition-colors">
          <i data-lucide="check-circle" class="w-3 h-3"></i> Approve
        </button>
        <p class="text-xs text-amber-600">Same "confirm a positive action" role as Primary above, but a different color — candidate for consolidation.</p>
      </div>
    </section>

    <section class="bg-white rounded-xl shadow-sm border border-gray-100 p-6 space-y-4">
      <h2 class="text-xs font-semibold text-gray-500 uppercase tracking-wide">Secondary / Ghost</h2>
      <div class="flex flex-wrap items-center gap-3">
        <button class="border border-gray-200 text-gray-700 px-4 py-2 rounded-lg text-sm font-semibold hover:bg-gray-50 transition-colors">Cancel</button>
        <button class="text-gray-500 px-3 py-1.5 rounded-lg text-xs font-medium hover:bg-gray-100 transition-colors">Dismiss</button>
      </div>
    </section>

    <section class="bg-white rounded-xl shadow-sm border border-gray-100 p-6 space-y-4">
      <h2 class="text-xs font-semibold text-gray-500 uppercase tracking-wide">Destructive</h2>
      <div class="flex flex-wrap items-center gap-3">
        <button class="bg-red-600 text-white px-4 py-2 rounded-lg text-sm font-semibold hover:bg-red-700 transition-colors">Delete</button>
      </div>
    </section>
  </div>
  <script>lucide.createIcons();</script>
</body>
</html>
