<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>CareTime — Sidebar Nav Item</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-gray-50 p-10">
  <div class="max-w-md mx-auto space-y-6">
    <header>
      <h1 class="text-2xl font-bold text-gray-900">Sidebar Nav Item</h1>
      <p class="text-sm text-gray-500 mt-1">From <code class="bg-gray-100 px-1 rounded text-xs">components/Sidebar.tsx</code>.</p>
    </header>
    <div class="bg-gray-900 rounded-xl p-2 space-y-0.5 max-w-xs">
      <div class="flex items-center gap-2.5 px-3 py-2 rounded-lg text-sm bg-blue-600 text-white">
        <i data-lucide="layout-dashboard" class="w-4 h-4"></i> Dashboard (active)
      </div>
      <div class="flex items-center gap-2.5 px-3 py-2 rounded-lg text-sm text-gray-400 hover:bg-gray-800 hover:text-white transition-colors">
        <i data-lucide="users" class="w-4 h-4"></i> Clients (inactive)
      </div>
      <div class="flex items-center gap-2.5 px-3 py-2 rounded-lg text-sm text-gray-400 hover:bg-gray-800 hover:text-white transition-colors">
        <i data-lucide="calendar" class="w-4 h-4"></i> Calendar (inactive)
      </div>
    </div>
  </div>
  <script>lucide.createIcons();</script>
</body>
</html>
