<!-- @dsCard group="Components" name="Status Badges" subtitle="Reconciled status-pill palette for activity lifecycle" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>CareTime — Status Badges</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 p-10">
  <div class="max-w-2xl mx-auto space-y-6">
    <header>
      <h1 class="text-2xl font-bold text-gray-900">Status Badges</h1>
      <p class="text-sm text-gray-500 mt-1">One pill per activity status, in lifecycle order.</p>
    </header>
    <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-6 flex flex-wrap gap-2">
      <span class="px-2 py-1 rounded-full text-xs font-medium bg-yellow-100 text-yellow-800">Awaiting Acceptance</span>
      <span class="px-2 py-1 rounded-full text-xs font-medium bg-blue-100 text-blue-800">Scheduled</span>
      <span class="px-2 py-1 rounded-full text-xs font-medium bg-purple-100 text-purple-800">In Progress</span>
      <span class="px-2 py-1 rounded-full text-xs font-medium bg-orange-100 text-orange-800">Awaiting Client Approval</span>
      <span class="px-2 py-1 rounded-full text-xs font-medium bg-indigo-100 text-indigo-800">Awaiting Payment Approval</span>
      <span class="px-2 py-1 rounded-full text-xs font-medium bg-green-100 text-green-800">Ready for Payment</span>
      <span class="px-2 py-1 rounded-full text-xs font-medium bg-gray-100 text-gray-600">Paid</span>
      <span class="px-2 py-1 rounded-full text-xs font-medium bg-red-100 text-red-800">Rejected</span>
      <span class="px-2 py-1 rounded-full text-xs font-medium bg-gray-100 text-gray-400">Cancelled</span>
    </div>
  </div>
</body>
</html>
